<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appointment Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Book an Appointment</h1>
      </header>

      <form class="booking" id="booking_form">
        <section class="calendar">
          <label for="name">Name</label>
<div class="input-wrap">
  <input type="text" id="name" class="form-input" required />
  <span class="tick" aria-hidden="true">✓</span>
</div>

<label for="email">Email</label>
<div class="input-wrap">
  <input type="email" id="email" class="form-input" required />
  <span class="tick" aria-hidden="true">✓</span>
</div>
<small id="email-error" class="error-text"></small>

<label for="date">Select a date</label>
<input type="date" id="date" class="form-input" required />
          <h2 id="timeslots-heading">Available Time Slots</h2>
          <fieldset class="timeslots" aria-labelledby="timeslots-heading">
            <legend class="hidden">Choose a time slot</legend>
            <button class="slot" type="button" aria-label="Select 09:00 time slot">09:00</button>
            <button class="slot" type="button" aria-label="Select 10:30 time slot">10:30</button>
            <button class="slot" type="button" aria-label="Select 13:00 time slot">13:00</button>
            <button class="slot" type="button" aria-label="Select 14:30 time slot">14:30</button>
            <button class="slot" type="button" aria-label="Select 16:00 time slot">16:00</button>
          </fieldset>
        </section>

        <aside class="summary">
          <h2>Your Appointment</h2>
          <p>Name: <span id="selected-name">-</span></p> 
  <p>Email: <span id="selected-email">-</span></p>
          <p>Date: <span id="selected-date">-</span></p>
          <p>Time: <span id="selected-time">-</span></p>
          
          <button id="confirm" disabled>Confirm Booking</button>
        </aside>
      </form>

      <section class="hidden" id="confirmation">
        <h2 id="confirmation-title">The appointment is confirmed!</h2>
        <div>
          <p><strong>Name:</strong> <span id="confirmed-name"></span></p>
<p><strong>Email:</strong> <span id="confirmed-email"></span></p>
            <p>Date: <span id="confirmed-date"></span></p>
          <p>Time: <span id="confirmed-time"></span></p>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
